name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.3.0)'
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          pip install pyinstaller
          npm ci
          cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build PyInstaller backend
        run: |
          pyinstaller \
            --onefile \
            --name agent-hub-backend \
            --add-data "frontend/dist:frontend/dist" \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import websockets \
            --collect-submodules agent_hub \
            desktop_entry.py
          mkdir -p pyinstaller-dist
          cp dist/agent-hub-backend pyinstaller-dist/agent-hub-backend

      - name: Build Tauri DMG
        uses: tauri-apps/tauri-action@v0
        with:
          args: --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agent-Hub-macOS-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          pip install pyinstaller
          npm ci
          cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build PyInstaller backend
        run: |
          pyinstaller `
            --onefile `
            --name agent-hub-backend `
            --add-data "frontend/dist;frontend/dist" `
            --hidden-import uvicorn `
            --hidden-import fastapi `
            --hidden-import websockets `
            --collect-submodules agent_hub `
            desktop_entry.py
          mkdir pyinstaller-dist
          copy dist\agent-hub-backend.exe pyinstaller-dist\agent-hub-backend.exe

      - name: Build Tauri MSI
        uses: tauri-apps/tauri-action@v0
        with:
          args: --bundles msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agent-Hub-Windows-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Agent-Hub-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.dmg
            *.msi
          draft: false
          generate_release_notes: true
